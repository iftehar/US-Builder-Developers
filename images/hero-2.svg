<svg width="400" height="320" xmlns="http://www.w3.org/2000/svg">
  <!-- Luxurious bedroom background -->
  <rect width="400" height="320" fill="#f8f9fa"/>

  <!-- Wall -->
  <rect x="0" y="0" width="400" height="220" fill="#ffffff"/>
  <rect x="0" y="220" width="400" height="100" fill="#e8f8f9"/>

  <!-- King size bed -->
  <rect x="100" y="160" width="200" height="80" fill="#2d3748" rx="10"/>
  <!-- Bed headboard -->
  <rect x="95" y="140" width="210" height="30" fill="#1a202c" rx="5"/>
  <!-- Pillows -->
  <rect x="120" y="170" width="40" height="25" fill="#ffffff" rx="5"/>
  <rect x="170" y="170" width="40" height="25" fill="#ffffff" rx="5"/>
  <rect x="220" y="170" width="40" height="25" fill="#ffffff" rx="5"/>
  <!-- Blanket -->
  <rect x="105" y="195" width="190" height="40" fill="#0b8a8c" rx="5"/>
  <rect x="110" y="200" width="180" height="30" fill="#ffffff" rx="3"/>

  <!-- Nightstands -->
  <rect x="60" y="200" width="30" height="8" fill="#8b5a3c" rx="4"/>
  <rect x="65" y="190" width="6" height="25" fill="#8b5a3c"/>
  <rect x="79" y="190" width="6" height="25" fill="#8b5a3c"/>
  <rect x="70" y="195" width="10" height="3" fill="#a0785a"/>

  <rect x="310" y="200" width="30" height="8" fill="#8b5a3c" rx="4"/>
  <rect x="315" y="190" width="6" height="25" fill="#8b5a3c"/>
  <rect x="329" y="190" width="6" height="25" fill="#8b5a3c"/>
  <rect x="320" y="195" width="10" height="3" fill="#a0785a"/>

  <!-- Lamps -->
  <rect x="72" y="175" width="3" height="15" fill="#4a5568"/>
  <circle cx="73.5" cy="170" r="6" fill="#fbbf24"/>
  <circle cx="73.5" cy="170" r="4" fill="#f59e0b"/>

  <rect x="325" y="175" width="3" height="15" fill="#4a5568"/>
  <circle cx="326.5" cy="170" r="6" fill="#fbbf24"/>
  <circle cx="326.5" cy="170" r="4" fill="#f59e0b"/>

  <!-- Window -->
  <rect x="20" y="40" width="80" height="120" fill="#87ceeb"/>
  <rect x="25" y="45" width="70" height="110" fill="#b3e5fc"/>
  <!-- Window frame -->
  <rect x="50" y="40" width="4" height="120" fill="#4a5568"/>
  <rect x="20" y="100" width="80" height="4" fill="#4a5568"/>

  <!-- Wardrobe -->
  <rect x="320" y="80" width="60" height="100" fill="#4a5568" rx="5"/>
  <rect x="325" y="85" width="50" height="90" fill="#2d3748" rx="3"/>
  <!-- Wardrobe doors -->
  <rect x="325" y="85" width="24" height="90" fill="#1a202c" rx="2"/>
  <rect x="351" y="85" width="24" height="90" fill="#1a202c" rx="2"/>
  <circle cx="337" cy="130" r="3" fill="#fbbf24"/>
  <circle cx="363" cy="130" r="3" fill="#fbbf24"/>

  <!-- Art on wall -->
  <rect x="150" y="30" width="100" height="60" fill="#0b8a8c" rx="5"/>
  <rect x="155" y="35" width="90" height="50" fill="#ffffff" rx="3"/>
  <!-- Abstract art -->
  <circle cx="175" cy="50" r="15" fill="#0b8a8c"/>
  <circle cx="225" cy="50" r="15" fill="#0b8a8c"/>
  <rect x="190" y="45" width="30" height="10" fill="#0b8a8c" rx="5"/>
  <circle cx="200" cy="70" r="12" fill="#0b8a8c"/>
  <circle cx="220" cy="70" r="12" fill="#0b8a8c"/>

  <!-- Carpet -->
  <ellipse cx="200" cy="280" rx="120" ry="30" fill="#8b5a3c"/>
  <ellipse cx="200" cy="275" rx="110" ry="25" fill="#a0785a"/>

  <text x="200" y="305" text-anchor="middle" fill="#0b8a8c" font-family="Arial" font-size="16" font-weight="bold">Commercial Excellence</text>
</svg>