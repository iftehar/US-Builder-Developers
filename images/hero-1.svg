<svg width="400" height="300" xmlns="http://www.w3.org/2000/svg">
  <!-- Luxurious living room background -->
  <rect width="400" height="300" fill="#f8f9fa"/>

  <!-- Wall -->
  <rect x="0" y="0" width="400" height="200" fill="#ffffff"/>
  <rect x="0" y="200" width="400" height="100" fill="#e8f4fd"/>

  <!-- Sofa -->
  <rect x="80" y="180" width="120" height="60" fill="#2d3748" rx="10"/>
  <rect x="85" y="170" width="110" height="15" fill="#4a5568" rx="7"/>
  <!-- Sofa cushions -->
  <rect x="90" y="185" width="35" height="45" fill="#4a5568" rx="5"/>
  <rect x="135" y="185" width="35" height="45" fill="#4a5568" rx="5"/>
  <rect x="155" y="185" width="35" height="45" fill="#4a5568" rx="5"/>

  <!-- Coffee table -->
  <rect x="130" y="210" width="80" height="8" fill="#8b5a3c" rx="4"/>
  <rect x="135" y="200" width="8" height="25" fill="#8b5a3c"/>
  <rect x="197" y="200" width="8" height="25" fill="#8b5a3c"/>
  <rect x="145" y="205" width="50" height="3" fill="#a0785a"/>

  <!-- Side table -->
  <rect x="250" y="190" width="40" height="6" fill="#8b5a3c" rx="3"/>
  <rect x="255" y="180" width="6" height="20" fill="#8b5a3c"/>
  <rect x="279" y="180" width="6" height="20" fill="#8b5a3c"/>
  <rect x="260" y="185" width="20" height="3" fill="#a0785a"/>

  <!-- Lamp -->
  <rect x="265" y="165" width="4" height="20" fill="#4a5568"/>
  <circle cx="267" cy="160" r="8" fill="#fbbf24"/>
  <circle cx="267" cy="160" r="6" fill="#f59e0b"/>

  <!-- Window -->
  <rect x="300" y="50" width="80" height="120" fill="#87ceeb"/>
  <rect x="305" y="55" width="70" height="110" fill="#b3e5fc"/>
  <!-- Window frame -->
  <rect x="330" y="50" width="4" height="120" fill="#4a5568"/>
  <rect x="300" y="110" width="80" height="4" fill="#4a5568"/>

  <!-- Plants -->
  <rect x="20" y="150" width="15" height="40" fill="#22c55e"/>
  <circle cx="27" cy="145" r="12" fill="#16a34a"/>
  <rect x="360" y="160" width="12" height="35" fill="#22c55e"/>
  <circle cx="366" cy="155" r="10" fill="#16a34a"/>

  <!-- Art on wall -->
  <rect x="50" y="40" width="60" height="40" fill="#0d5dff" rx="5"/>
  <rect x="55" y="45" width="50" height="30" fill="#ffffff" rx="3"/>
  <rect x="65" y="50" width="8" height="8" fill="#0d5dff"/>
  <rect x="80" y="50" width="8" height="8" fill="#0d5dff"/>
  <rect x="65" y="65" width="8" height="8" fill="#0d5dff"/>
  <rect x="80" y="65" width="8" height="8" fill="#0d5dff"/>

  <text x="200" y="270" text-anchor="middle" fill="#0d5dff" font-family="Arial" font-size="16" font-weight="bold">Premium Living</text>
</svg>